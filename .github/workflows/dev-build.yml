name: Build (Dev)
on:
  push:
    branches:
      - dev

jobs:
  release:
    name: Build and create pre-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Get latest version tag
        id: version
        run: |
          latest_tag=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || true)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: dotnet publish -c Release -f net10.0 WebhookDump/WebhookDump.csproj

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          name: 'WebhookDump ${{ steps.version.outputs.latest_tag }}-dev.${{ github.run_number }}'
          tag_name: "${{ steps.version.outputs.latest_tag }}-dev.${{ github.run_number }}"
          prerelease: true
          generate_release_notes: true
          files: WebhookDump/bin/Release/net10.0/publish/WebhookDump.dll
