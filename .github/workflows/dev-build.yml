name: Build (Dev)
on:
  push:
    branches:
      - dev
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - name: Build plugin
        run: dotnet publish -c Release -f net10.0 WebhookDump/WebhookDump.csproj
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: WebhookDump/bin/Release/net10.0/publish/WebhookDump.dll
