name: Build (Master)
on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
      - name: Build plugin
        run: dotnet publish -c Release -f net10.0 WebhookDump/WebhookDump.csproj
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: WebhookDump.dll
          archive: false
          path: WebhookDump/bin/Release/net10.0/publish/WebhookDump.dll

  release:
    name: Create preview release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: WebhookDump.dll
          path: release-assets
      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          name: 'WebhookDump Preview Release'
          prerelease: true
          generate_release_notes: true
          tag_name: preview-${{ github.run_number }}
          files: release-assets/WebhookDump.dll
